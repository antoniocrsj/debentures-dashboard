<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f4e9c"/>
      <stop offset="0.55" stop-color="#1a3d78"/>
      <stop offset="1" stop-color="#14253f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#3b6fc4" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#3b6fc4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed background: preenche o quadrado inteiro (fica bom em qualquer recorte) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>

  <!-- barras ascendentes (mais suaves, dentro da safe zone ~90..422) -->
  <g fill="#6ea8e6" opacity="0.5">
    <rect x="150" y="300" width="46" height="62"  rx="10"/>
    <rect x="233" y="262" width="46" height="100" rx="10"/>
    <rect x="316" y="222" width="46" height="140" rx="10"/>
  </g>

  <!-- linha de tendencia em alta + seta (mais fina) -->
  <g fill="none" stroke="#ffffff" stroke-width="19" stroke-linecap="round" stroke-linejoin="round">
    <path d="M150 250 L233 200 L316 226 L392 150"/>
    <path d="M350 150 H392 V192"/>
  </g>
</svg>
